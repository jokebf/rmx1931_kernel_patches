name: Build RMX1931 (samurai) Kernel

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Kernel branch to build'
        required: true
        default: 'lineage-20'
        type: choice
        options:
          - lineage-20
          - lineage-21

jobs:
  build-kernel:
    runs-on: ubuntu-20.04
    steps:
      - name: Check free space
        run: df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential curl flex g++-multilib \
            gcc-multilib git liblz4-tool libncurses5-dev \
            libssl-dev libxml2-utils lzop \
            rsync squashfs-tools xsltproc zip zlib1g-dev \
            libelf-dev device-tree-compiler \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b ${{ inputs.branch }} \
            https://github.com/HyperTeam/android_kernel_realme_sm8150.git kernel
          cd kernel

      - name: Apply patches
        run: |
          cd kernel
          # Apply patch 1: charger deadlock fix via Python script
          curl -sL "https://raw.githubusercontent.com/jokebf/rmx1931_kernel_patches/main/apply_patch1.py" \
            -o /tmp/apply_patch1.py
          python3 /tmp/apply_patch1.py drivers/power/oppo/oplus_charger.c

      - name: Configure kernel
        run: |
          cd kernel
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            samurai_defconfig || { echo "DEFCONFIG FAILED"; exit 1; }
          
          # Verify OPLUS_CHARGER is enabled
          grep -q "OPLUS_CHARGER" out/.config && echo "OPLUS_CHARGER: CONFIGURED ✓" || echo "WARNING: OPLUS_CHARGER not in defconfig!"

      - name: Build kernel
        run: |
          cd kernel
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc) > build.log 2>&1
          RC=$?
          echo "Exit code: $RC"
          if [ $RC -ne 0 ]; then
            tail -50 build.log
          fi
          exit $RC
 
      - name: Check build output
        run: |
          echo "=== Last 30 lines of build ==="
          tail -30 kernel/build.log
          echo ""
          echo "=== Build artifacts ==="
          find kernel/out/arch/arm64/boot -type f -name "*.dtb" -o -name "Image*" -o -name "*.gz" | sort 2>/dev/null || echo "No boot artifacts found"
          echo ""
          echo "=== Image size ==="
          ls -lh kernel/out/arch/arm64/boot/Image.gz-dtb 2>/dev/null || \
          ls -lh kernel/out/arch/arm64/boot/Image 2>/dev/null || \
          ls -lh kernel/out/arch/arm64/boot/Image.gz 2>/dev/null || \
          echo "No kernel image found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: rmx1931-kernel-${{ inputs.branch }}
          path: |
            kernel/out/arch/arm64/boot/Image.gz-dtb
            kernel/out/arch/arm64/boot/Image
            kernel/out/arch/arm64/boot/*.dtb
          if-no-files-found: error
